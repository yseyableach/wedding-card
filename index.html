<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>程傑 & 郁庭 婚禮邀請函 2027.05.01</title>
    <!-- 核心庫載入 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #FFFBF0; margin: 0; padding: 0; }
        #root { min-height: 100vh; }
        .loading-screen { display: flex; justify-content: center; items-center; height: 100vh; font-size: 1.5rem; color: #fb7185; font-weight: bold; }
        @keyframes heartBeat { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        .animate-heart { animation: heartBeat 1.5s infinite; }
    </style>
</head>
<body>
    <!-- 預設顯示內容，防止 React 載入前的白畫面 -->
    <div id="root">
        <div class="loading-screen">
            <div class="text-center">
                <div class="text-4xl mb-4">❤️</div>
                <p>程傑 & 郁庭 的喜帖載入中...</p>
                <p class="text-sm font-normal text-gray-400 mt-2">如果此畫面停留過久，請檢查網路連線</p>
            </div>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icons = {
            Heart: () => (
                <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
            ),
            MapPin: () => (
                <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
            ),
            ExternalLink: () => (
                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
            )
        };

        const CONFIG = {
            googleFormUrl: "https://docs.google.com/forms/d/e/1FAIpQLSdUv3r4uG6I_G9L5S2z2x9T0Gz8vE8T-7z2vE/viewform", // 這裡換成你的表單
            names: { groom: "程傑", bride: "郁庭" },
            date: "2027.05.01",
            venue: "台北萬豪酒店 36F 寰宇廳",
            images: {
                hero: "./images/hero.jpg",
                photo1: "./images/p1.jpg",
                photo2: "./images/p2.jpg",
                photo3: "./images/p3.jpg",
                photo4: "./images/p4.jpg",
                photo5: "./images/p5.jpg",
                photo6: "./images/p6.jpg",
            }
        };

        const App = () => {
            const [countdown, setCountdown] = useState({ 天: 0, 時: 0, 分: 0, 秒: 0 });
            const [noBtnPos, setNoBtnPos] = useState({ top: 0, left: 0 });
            const [isNoBtnEscaping, setIsNoBtnEscaping] = useState(false);

            useEffect(() => {
                const target = new Date('2027-05-01T12:00:00').getTime();
                const timer = setInterval(() => {
                    const now = new Date().getTime();
                    const dist = target - now;
                    if (dist < 0) return clearInterval(timer);
                    
                    setCountdown({
                        天: Math.floor(dist / (1000 * 60 * 60 * 24)),
                        時: Math.floor((dist % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)),
                        分: Math.floor((dist % (1000 * 60 * 60)) / (1000 * 60)),
                        秒: Math.floor((dist % (1000 * 60)) / 1000),
                    });
                }, 1000);
                return () => clearInterval(timer);
            }, []);

            const handleNoHover = () => {
                setIsNoBtnEscaping(true);
                setNoBtnPos({ 
                    top: Math.floor(Math.random() * 160) - 80, 
                    left: Math.floor(Math.random() * 160) - 80 
                });
            };

            return (
                <div className="overflow-x-hidden">
                    {}
                    <section className="relative h-screen flex flex-col items-center justify-center text-center p-6">
                        <div className="absolute inset-0 -z-10 bg-rose-50 overflow-hidden">
                            <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[150%] h-[150%] bg-[radial-gradient(circle,#fda4af_0%,transparent_70%)] opacity-30"></div>
                            <img 
                                src={CONFIG.images.hero} 
                                className="w-full h-full object-cover opacity-40 mix-blend-overlay" 
                                onError={(e) => { e.target.style.display='none'; }}
                            />
                        </div>
                        
                        <div className="space-y-6 animate-heart">
                            <div className="inline-block bg-black text-white px-4 py-1 text-xs font-black tracking-widest uppercase">Official Announcement</div>
                            <h1 className="text-6xl md:text-8xl font-black text-rose-500 italic leading-tight">
                                {CONFIG.names.groom} <span className="text-gray-400 not-italic">&</span> {CONFIG.names.bride}
                            </h1>
                            <p className="text-2xl font-bold text-gray-600 tracking-widest">{CONFIG.date}</p>
                            <div className="flex items-center justify-center gap-2 text-rose-400 font-bold">
                                <Icons.MapPin /> {CONFIG.venue}
                            </div>
                        </div>
                    </section>

                    {}
                    <section className="py-20 bg-white shadow-inner flex justify-center gap-4 md:gap-10">
                        {Object.entries(countdown).map(([u, v]) => (
                            <div key={u} className="text-center">
                                <div className="text-4xl md:text-7xl font-black text-rose-500">{v}</div>
                                <div className="text-xs font-bold text-gray-300 uppercase">{u}</div>
                            </div>
                        ))}
                    </section>

                    {}
                    <section className="py-24 px-6 max-w-4xl mx-auto text-center">
                        <div className="bg-white p-10 md:p-20 rounded-[3rem] shadow-2xl border-2 border-rose-50 relative overflow-hidden">
                            <div className="absolute top-0 right-0 p-4 opacity-10 text-rose-500">
                                <Icons.Heart />
                            </div>
                            <h2 className="text-3xl md:text-5xl font-black mb-8 italic">「關於這份終身合約...」</h2>
                            <p className="text-lg text-gray-600 leading-loose">
                                經過長達數年的「性能測試」與「壓力評估」，<br/>
                                <strong>{CONFIG.names.groom}</strong> 與 <strong>{CONFIG.names.bride}</strong> 決定正式進入運維階段。<br/>
                                我們不打算退貨，也請大家不要退紅包。<br/>
                                <span className="text-rose-500 block mt-6 font-black text-2xl">2027/05/01 萬豪 36 樓，不見不散！</span>
                            </p>
                        </div>
                    </section>

                    {}
                    <section className="py-20 px-6 max-w-6xl mx-auto">
                        <div className="columns-2 md:columns-3 gap-4 space-y-4">
                            {[1,2,3,4,5,6].map(i => (
                                <div key={i} className="bg-gray-100 rounded-3xl overflow-hidden shadow-lg border-4 border-white transform hover:scale-[1.02] transition-transform aspect-[3/4] flex items-center justify-center">
                                    <img 
                                        src={CONFIG.images[`photo${i}`]} 
                                        alt={`Photo ${i}`}
                                        className="w-full h-full object-cover"
                                        onError={(e) => {
                                            e.target.parentElement.innerHTML = '<div class="text-gray-300 font-bold">Photo Coming Soon</div>';
                                        }}
                                    />
                                </div>
                            ))}
                        </div>
                    </section>

                    {}
                    <section className="py-32 px-6 bg-rose-500 text-white text-center">
                        <h2 className="text-4xl font-black mb-12">程傑 & 郁庭 需要你的回覆！</h2>
                        <div className="flex flex-col items-center gap-8 relative">
                            <a 
                                href={CONFIG.googleFormUrl}
                                target="_blank"
                                className="z-10 bg-white text-rose-500 px-12 py-6 rounded-full text-2xl font-black shadow-2xl hover:scale-105 active:scale-95 transition-all flex items-center gap-2"
                            >
                                前往填寫 Google 表單 <Icons.ExternalLink />
                            </a>

                            <div className="relative h-16 w-full flex justify-center items-center">
                                <button 
                                    onMouseEnter={handleNoHover}
                                    style={{ 
                                        position: isNoBtnEscaping ? 'absolute' : 'static',
                                        top: `${noBtnPos.top}px`,
                                        left: `${noBtnPos.left}px`,
                                        transition: 'all 0.1s ease-out'
                                    }}
                                    className="px-6 py-2 bg-rose-400 text-rose-100 text-xs font-bold rounded-full shadow-lg"
                                >
                                    不忍心看程傑娶到正妹 (按不到按不到)
                                </button>
                            </div>
                        </div>
                    </section>

                    <footer className="py-20 text-center text-gray-300 text-[10px] font-black uppercase tracking-[0.5em]">
                        Handcrafted for Cheng-Chieh & Yu-Ting 2027
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
