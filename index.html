<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活動邀請函</title>
    <!-- 引入 Tailwind CSS 進行快速排版與設計 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Google Fonts: Noto Sans TC 增加質感 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Playfair+Display:ital,wght@1,500&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            /* 柔和的漸層背景，增添優雅感 */
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .serif-text {
            font-family: 'Playfair Display', serif;
        }
        /* 卡片進場動畫 */
        .fade-in-up {
            animation: fadeInUp 0.8s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }
        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body class="p-4 sm:p-8 text-gray-800">

    <div class="max-w-md w-full bg-white rounded-3xl shadow-xl overflow-hidden fade-in-up">
        
        <!-- 頂部裝飾區塊 -->
        <div class="h-32 bg-indigo-50 flex items-center justify-center relative overflow-hidden">
            <!-- 簡單的幾何裝飾 -->
            <div class="absolute -top-10 -right-10 w-32 h-32 bg-indigo-200 rounded-full mix-blend-multiply filter blur-xl opacity-70"></div>
            <div class="absolute -bottom-10 -left-10 w-32 h-32 bg-pink-200 rounded-full mix-blend-multiply filter blur-xl opacity-70"></div>
            
            <p class="serif-text italic text-indigo-300 text-2xl z-10 tracking-widest">You're Invited</p>
        </div>

        <!-- 卡片主要內容 -->
        <div class="p-8">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-gray-900 mb-2">夏日聚會</h1>
                <p class="text-gray-500 text-sm tracking-wide">SUMMER GATHERING</p>
            </div>

            <div class="space-y-4 mb-8">
                <!-- 時間 -->
                <div class="flex items-start">
                    <div class="flex-shrink-0 mt-1 text-indigo-500">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    </div>
                    <div class="ml-3">
                        <p class="font-medium text-gray-900">時間</p>
                        <p class="text-gray-600">2026年 6月 20日 (星期六)<br>下午 2:00 - 5:00</p>
                    </div>
                </div>

                <!-- 地點 -->
                <div class="flex items-start">
                    <div class="flex-shrink-0 mt-1 text-indigo-500">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    </div>
                    <div class="ml-3">
                        <p class="font-medium text-gray-900">地點</p>
                        <p class="text-gray-600">陽光咖啡廳<br><span class="text-sm text-gray-400">台北市信義區測試路 123 號</span></p>
                    </div>
                </div>
            </div>

            <!-- 底部按鈕區 -->
            <div class="text-center mt-8 pt-6 border-t border-gray-100">
                <p class="text-sm text-gray-500 mb-4">期待您的參與，請於 6/10 前回覆。</p>
                <button onclick="document.getElementById('rsvp-msg').classList.remove('hidden')" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-3 px-4 rounded-xl transition duration-300 ease-in-out shadow-md hover:shadow-lg transform hover:-translate-y-0.5">
                    我會參加！
                </button>
                <!-- 點擊按鈕後顯示的訊息 -->
                <p id="rsvp-msg" class="hidden mt-4 text-green-600 font-medium text-sm transition-opacity">感謝回覆！期待見到你！</p>
            </div>
        </div>
    </div>

</body>
</html>
